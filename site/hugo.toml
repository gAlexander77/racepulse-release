baseURL = "https://racepulse.racing/"
languageCode = "en-us"
title = "RacePulse"
enableRobotsTXT = true
enableGitInfo = true
disableKinds = ["taxonomy", "term"]

[params]
  description = "Real-time sim racing telemetry overlays for iRacing, Assetto Corsa Competizione, Assetto Corsa, Le Mans Ultimate, F1 25, and F1 24"
  # og:image must be a small static image — social scrapers reject the multi-MB GIFs
  # (X/Twitter caps cards at 5 MB), so point at the .jpg stills, not the .gif previews.
  ogImage = "assets/application-preview.jpg"
  siteIcon = "favicon.svg"
  repoURL = "https://github.com/gAlexander77/racepulse-release"
  releaseURL = "https://github.com/gAlexander77/racepulse-release/releases"
  # Bump appVersion and downloadURL together on each release (footer + schema read appVersion).
  appVersion = "0.3.1"
  downloadURL = "https://github.com/gAlexander77/racepulse-release/releases/download/v0.3.1/RacePulse.exe"
  # Date the preview MP4s referenced by VideoObject schema were last replaced.
  videoUploadDate = "2026-05-23"
  # Google Analytics 4 Measurement ID. In production it is injected at build time from the
  # GitHub Actions repo variable GA_MEASUREMENT_ID (via HUGO_PARAMS_GOOGLEANALYTICS, see pages.yml),
  # so the ID intentionally lives in CI, not source. Set a value here only for local testing.
  # Empty = GA disabled; GoatCounter still runs.
  googleAnalytics = ""

  # Website analytics behaviour — see layouts/partials/analytics.html for how each is used.
  # Keep these as real TOML booleans; do NOT inject them via HUGO_PARAMS_* env vars (env values
  # arrive as strings and "false" is truthy in Go templates). Only the GA ID above is env-injected.
  [params.analytics]
    enableGoatCounter = true              # false = never load GoatCounter (cookieless, aggregate)
    enableGoogleAnalytics = true          # false = never load Google Analytics (also needs the ID above)
    enableAnalyticsConsentBanner = true   # show the consent banner where consent is required
    # region-aware | always-full | always-consent.
    #   region-aware: non-EU visitors get full GA on by default; EU/EEA/UK/CH get the banner with
    #                 Consent Mode default-denied. Region comes from an edge function if present
    #                 (<html data-consent-required="true|false">), otherwise from the browser timezone.
    #   always-full: GA granted by default everywhere (use only if you are sure consent isn't required).
    #   always-consent: Consent Mode default-denied everywhere until the visitor accepts.
    googleAnalyticsMode = "region-aware"
    requireConsentFallback = true         # when region is unknown, fall back to default-denied (safe)
    honorGlobalPrivacyControl = true      # treat navigator.globalPrivacyControl === true as "denied"
    disableGoogleSignals = true           # no Signals => no remarketing/demographics/interests
    disableAdsPersonalization = true      # no ad personalization signals

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Features"
    url = "/features/"
    weight = 2
  [[menu.main]]
    name = "Install"
    url = "/install/"
    weight = 3
  [[menu.main]]
    name = "Changelog"
    url = "/changelog/"
    weight = 4
  [[menu.main]]
    name = "FAQ"
    url = "/faq/"
    weight = 5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
