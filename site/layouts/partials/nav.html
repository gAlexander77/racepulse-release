<nav class="bar">
  <a class="brand" href="{{ .Site.BaseURL }}">
    <span class="word">RACE<i>PULSE</i></span>
    <svg class="mark" viewBox="0 0 92 92" fill="currentColor" aria-hidden="true">
      <path d="M92,57c0,2.2-1.8,4-4,4H69.2c-1.7,0-3.2-0.9-3.8-2.6l-3-8.4l-9.8,33.1c-0.5,1.7-2.1,2.9-3.8,2.9 c0,0-0.1,0-0.1,0c-1.8-0.1-3.4-1.3-3.8-3.1L32,27l-7.8,31.1c-0.4,1.8-2,2.9-3.9,2.9H4c-2.2,0-4-1.8-4-4s1.8-4,4-4h13.2L28.3,8.9 C28.7,7.1,30.4,6,32.2,6c1.8,0,3.4,1.3,3.9,3.1l13.2,57.2l9-30.4c0.5-1.7,2-2.9,3.7-2.9c1.7-0.1,3.3,1,3.9,2.6L72,53h16 C90.2,53,92,54.8,92,57z"/>
    </svg>
  </a>
  <ul>
    {{ range .Site.Menus.main }}
      {{ $active := eq $.RelPermalink .URL }}
      <li><a href="{{ .URL | absURL }}"{{ if $active }} class="is-active" aria-current="page"{{ end }}>{{ .Name }}</a></li>
    {{ end }}
  </ul>
  <a class="btn btn--primary" href="{{ .Site.Params.downloadURL }}">
    Download
  </a>
  <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-mobile" aria-label="Toggle navigation menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true">
      <path d="M3 6h18M3 12h18M3 18h18"/>
    </svg>
  </button>
</nav>
<div id="nav-mobile" class="nav-mobile">
  {{ range .Site.Menus.main }}
    {{ $active := eq $.RelPermalink .URL }}
    <a href="{{ .URL | absURL }}"{{ if $active }} class="is-active" aria-current="page"{{ end }}>{{ .Name }}</a>
  {{ end }}
  <a href="{{ .Site.Params.downloadURL }}">Download for Windows</a>
</div>
<script>
  (function () {
    var btn = document.querySelector('.nav-toggle');
    var menu = document.getElementById('nav-mobile');
    if (!btn || !menu) return;
    function setOpen(open) {
      menu.classList.toggle('open', open);
      btn.setAttribute('aria-expanded', String(open));
      if (open) {
        var first = menu.querySelector('a');
        if (first) first.focus();
      }
    }
    btn.addEventListener('click', function () {
      setOpen(!menu.classList.contains('open'));
    });
    menu.addEventListener('click', function (e) {
      if (e.target.tagName === 'A') setOpen(false);
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && menu.classList.contains('open')) {
        setOpen(false);
        btn.focus();
      }
    });
  })();
</script>
