<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Support RacePulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .support-card {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      text-decoration: none;
    }
    .logo-text {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a1a1a;
    }
    .logo-text span {
      font-style: italic;
      color: #E11D48;
    }
    .logo svg {
      width: 20px;
      height: 20px;
      color: #E11D48;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .widget-wrapper {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      background: #fff;
    }
    .widget-wrapper iframe {
      display: block;
    }
    .back-link {
      padding-top: 48px;
      font-size: 13px;
      color: #9ca3af;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover {
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="support-card">
    <a href="https://racepulse.racing" class="logo">
      <span class="logo-text">RACE<span>PULSE</span></span>
      <svg viewBox="0 0 92 92" fill="currentColor">
        <path d="M92,57c0,2.2-1.8,4-4,4H69.2c-1.7,0-3.2-0.9-3.8-2.6l-3-8.4l-9.8,33.1c-0.5,1.7-2.1,2.9-3.8,2.9 c0,0-0.1,0-0.1,0c-1.8-0.1-3.4-1.3-3.8-3.1L32,27l-7.8,31.1c-0.4,1.8-2,2.9-3.9,2.9H4c-2.2,0-4-1.8-4-4s1.8-4,4-4h13.2L28.3,8.9 C28.7,7.1,30.4,6,32.2,6c1.8,0,3.4,1.3,3.9,3.1l13.2,57.2l9-30.4c0.5-1.7,2-2.9,3.7-2.9c1.7-0.1,3.3,1,3.9,2.6L72,53h16 C90.2,53,92,54.8,92,57z"></path>
      </svg>
    </a>
    <h1>Support RacePulse</h1>
    <p class="subtitle">RacePulse is built and maintained by one person. The app is completely free — if it's helped your racing, I'd really appreciate a coffee.</p>
    <div class="widget-wrapper">
      <iframe id='kofiframe' src='https://ko-fi.com/galexander/?hidefeed=true&widget=true&embed=true&preview=true' style='border:none;width:100%;' height='670' title='Support RacePulse on Ko-fi'></iframe>
    </div>
    <div style="height:48px;"></div>
    <a href="https://racepulse.racing" class="back-link">&larr; Back to racepulse.racing</a>
  </div>
</body>
</html>
