{{ define "main" }}
{{ $hasToc := gt (len .Fragments.Identifiers) 1 }}
<header class="page-hero">
  <div class="inner">
    <div class="eyebrow">
      <span class="red-bar"></span>
      <span class="crumb">
        <a class="home" href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
        <span class="sep" aria-hidden="true">/</span>
        <span class="here">{{ .Title }}</span>
      </span>
    </div>
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}
      <p class="subtitle">{{ . }}</p>
    {{ end }}
  </div>
</header>

<section class="dark-panel" style="padding-top: 80px;">
  {{ if $hasToc }}
    <div class="content-with-toc">
      <div class="prose">{{ .Content }}</div>
      <aside class="toc" aria-label="On this page">
        <details open>
          <summary>On this page</summary>
          {{ .TableOfContents }}
        </details>
      </aside>
    </div>
  {{ else }}
    <div class="shell-narrow">
      <div class="prose">{{ .Content }}</div>
    </div>
  {{ end }}
</section>
{{ end }}
